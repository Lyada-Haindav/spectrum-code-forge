<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Email</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="builder-page home-page">
    <div class="builder-glow builder-glow-coral"></div>
    <div class="builder-glow builder-glow-cyan"></div>
    <div class="builder-glow builder-glow-gold"></div>

    <header class="builder-topbar">
      <a class="brand-mark brand-mark-light" href="/">Solver</a>
      <nav class="builder-nav">
        <a href="/">Home</a>
        <a href="/builder.html">Solver</a>
      </nav>
      <div class="topbar-actions">
        <a class="hero-button hero-button-secondary" href="/">Back home</a>
      </div>
    </header>

    <main class="builder-shell home-shell">
      <section class="builder-panel home-flow-panel verify-panel">
        <div class="flow-copy">
          <p class="eyebrow eyebrow-light">Email confirmation</p>
          <h2 id="verify-title">Checking your confirmation link</h2>
          <p id="verify-copy">
            Verifying your account and preparing the workspace.
          </p>
        </div>

        <div id="verify-status" class="inline-message">Please wait a moment.</div>

        <div class="hero-actions">
          <a class="hero-button hero-button-primary" href="/builder.html">Go to workspace</a>
          <a class="hero-button hero-button-secondary" href="/">Return home</a>
        </div>
      </section>
    </main>

    <script src="/verify.js"></script>
  </body>
</html>
