<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Email | Spectrum Code Forge</title>
    <link rel="icon" type="image/svg+xml" href="/spectrum-code-forge-logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="builder-page home-page">
    <div class="builder-glow builder-glow-coral"></div>
    <div class="builder-glow builder-glow-cyan"></div>
    <div class="builder-glow builder-glow-gold"></div>

    <header class="builder-topbar">
      <a class="brand-lockup" href="/">
        <img class="brand-logo" src="/spectrum-code-forge-logo.svg" alt="Spectrum Code Forge" />
        <span class="brand-copy">
          <strong>Spectrum Code Forge</strong>
          <small>Logic. Code. Review.</small>
        </span>
      </a>
      <nav class="builder-nav">
        <a href="/">Home</a>
        <a href="/workspace">Workspace</a>
      </nav>
      <div class="topbar-actions">
        <a class="hero-button hero-button-secondary" href="/">Back home</a>
      </div>
    </header>

    <main class="builder-shell home-shell">
      <section class="builder-panel home-flow-panel verify-panel">
        <div class="flow-copy">
          <p class="eyebrow eyebrow-light">Email confirmation</p>
          <h2 id="verify-title">Checking your confirmation link</h2>
          <p id="verify-copy">
            Verifying your account and preparing Spectrum Code Forge.
          </p>
        </div>

        <div id="verify-status" class="inline-message">Please wait a moment.</div>

        <div class="hero-actions">
          <a class="hero-button hero-button-primary" href="/workspace">Go to workspace</a>
          <a class="hero-button hero-button-secondary" href="/">Return home</a>
        </div>
      </section>
    </main>

    <script src="/verify.js"></script>
  </body>
</html>
