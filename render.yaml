services:
  - type: web
    name: spectrum-code-forge-backend
    runtime: docker
    plan: starter
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: spectrum_code_forge
      - key: FREE_DAILY_LIMIT
        value: "6"
      - key: PREMIUM_WEEKLY_PRICE_INR
        value: "99"
      - key: PREMIUM_MONTHLY_PRICE_INR
        value: "399"
      - key: PREMIUM_YEARLY_PRICE_INR
        value: "599"
      - key: PREMIUM_UPI_NAME
        value: Spectrum Code Forge
      - key: APP_BASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: PREMIUM_UPI_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Spectrum Code Forge
